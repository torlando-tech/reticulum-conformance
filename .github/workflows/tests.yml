name: Conformance Tests

# Runs the conformance suite on every PR to this repo so a failing test
# can't land on main and poison downstream consumers (reticulum-kt,
# reticulum-swift). This mirrors reticulum-kt's conformance job so PR
# authors here see the same signal CI will emit after merge.
#
# Per-impl bridge env vars (CONFORMANCE_KOTLIN_BRIDGE_CMD etc.) are
# required — the legacy CONFORMANCE_BRIDGE_CMD global override silently
# forces every peer to the same bridge, masking any xfail keyed off
# transport_impl / sender_impl / receiver_impl.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          path: reticulum-conformance

      - uses: actions/checkout@v4
        with:
          repository: torlando-tech/reticulum-kt
          path: reticulum-kt

      # Pin RNS/LXMF to the audited release tags (RNS 1.3.1 / LXMF 0.9.9)
      # rather than tracking master HEAD. Without ref: CI silently validated
      # against whatever upstream master happened to be, not the ground-truth
      # release the suite was audited against (N-M16).
      - uses: actions/checkout@v4
        with:
          repository: markqvist/Reticulum
          ref: "1.3.1"
          path: Reticulum

      - uses: actions/checkout@v4
        with:
          repository: markqvist/LXMF
          ref: "0.9.9"
          path: LXMF

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        # `cryptography` is required by the pyca-provider equivalence tests
        # (crypto_provider_op imports RNS.Cryptography.Proxies, the OpenSSL/PyCA
        # backend). Without it the reference leg errors on those tests. It is
        # also a hard RNS runtime dependency, so installing it makes the
        # reference bridge's `import RNS` exercise the same provider real
        # deployments use, rather than only the pure-Python fallback.
        run: pip install pytest cryptography

      - name: Assert RNS/LXMF versions match audited ground truth (1.3.1 / 0.9.9)
        # Reads __version__ from the pinned checkouts' _version.py — the
        # definitive source of RNS.__version__/LXMF.__version__ — without a
        # full `import RNS` (which would need cryptography/pyserial that this
        # job does not pip-install). A mismatch means the ref: pins above
        # drifted from the audited ground truth, so fail loudly (N-M16).
        working-directory: reticulum-conformance
        env:
          PYTHON_RNS_PATH: ${{ github.workspace }}/Reticulum
          PYTHON_LXMF_PATH: ${{ github.workspace }}/LXMF
        run: |
          python3 - <<'PY'
          import os, sys
          import _rns_paths as p

          def version_of(pkg, env_var):
              base = p.resolve_package_path(pkg, env_var)
              vfile = os.path.join(base, pkg, "_version.py")
              ns = {}
              exec(compile(open(vfile).read(), vfile, "exec"), ns)
              return ns["__version__"]

          rns_v = version_of("RNS", "PYTHON_RNS_PATH")
          lxmf_v = version_of("LXMF", "PYTHON_LXMF_PATH")
          print(f"resolved RNS {rns_v} (from {p.resolve_rns_path()})")
          print(f"resolved LXMF {lxmf_v}")
          errs = []
          if rns_v != "1.3.1":
              errs.append(f"RNS {rns_v} != 1.3.1")
          if lxmf_v != "0.9.9":
              errs.append(f"LXMF {lxmf_v} != 0.9.9")
          if errs:
              print("::error::CI not pinned to audited ground truth: " + "; ".join(errs))
              sys.exit(1)
          print("OK: RNS 1.3.1 / LXMF 0.9.9 (audited ground truth)")
          PY

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Kotlin conformance bridge
        working-directory: reticulum-kt
        run: ./gradlew :conformance-bridge:shadowJar

      - name: Run cross-impl conformance tests (--impl=kotlin)
        working-directory: reticulum-conformance
        env:
          # Per-impl bridge commands. Kotlin peers use the JAR built
          # above; reference peers use the default Python bridge
          # configured in conftest.py BRIDGE_COMMANDS. DO NOT set the
          # legacy CONFORMANCE_BRIDGE_CMD — it applies globally and
          # silently breaks cross-impl parametrization.
          CONFORMANCE_KOTLIN_BRIDGE_CMD: java -jar ${{ github.workspace }}/reticulum-kt/conformance-bridge/build/libs/ConformanceBridge.jar
          PYTHON_RNS_PATH: ${{ github.workspace }}/Reticulum
          PYTHON_LXMF_PATH: ${{ github.workspace }}/LXMF
        # The legacy `--ignore=tests/lxmf` was a no-op — tests/lxmf/ no longer
        # exists in this repo — so it has been dropped (L18).
        run: python3 -m pytest tests/ --impl=kotlin -v --tb=short

      - name: Run reference-only baseline
        # Sanity check: the Python reference should always pass every
        # test on its own, with no xfails. A red here means either a
        # test is broken or something drifted in Python RNS — either
        # way a signal worth catching before shipping.
        working-directory: reticulum-conformance
        env:
          PYTHON_RNS_PATH: ${{ github.workspace }}/Reticulum
          PYTHON_LXMF_PATH: ${{ github.workspace }}/LXMF
        run: python3 -m pytest tests/ --reference-only -v --tb=short
